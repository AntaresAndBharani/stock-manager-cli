name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version bump
        if: github.event_name == 'pull_request'
        run: |
          VERSION_FILE=src/tradingtools_stock/__init__.py
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:$VERSION_FILE | grep -E '__version__' | awk -F '"' '{print $2}')
          CURRENT_VERSION=$(grep -E '__version__' $VERSION_FILE | awk -F '"' '{print $2}')
          
          echo "Base version: $BASE_VERSION"
          echo "Current version: $CURRENT_VERSION"
          
          if [ "$CURRENT_VERSION" = "$BASE_VERSION" ]; then
            echo "::error::Version must be bumped in pyproject.toml!"
            exit 1
          fi
          
          HIGHEST=$(printf "%s\n%s" "$BASE_VERSION" "$CURRENT_VERSION" | sort -V | tail -n 1)
          if [ "$HIGHEST" != "$CURRENT_VERSION" ]; then
            echo "::error::Current version ($CURRENT_VERSION) must be greater than base version ($BASE_VERSION)!"
            exit 1
          fi

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Type check with Mypy
      run: |
        mypy src tests

    - name: Test with pytest
      run: |
        pytest


