name: Publish to PyPI

on:
  push:
    branches:
      - main

permissions:
  contents: write    # needed to commit back the version bump
  id-token: write    # needed for default PyPI OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hatch
        run: pip install hatch

      - name: Check PyPI and Bump Version if Collides
        id: bump
        run: |
          PACKAGE_NAME=$(hatch project metadata name)
          VERSION=$(hatch version)
          
          echo "Checking PyPI for $PACKAGE_NAME version $VERSION..."
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://pypi.org/pypi/$PACKAGE_NAME/$VERSION/json)
          
          if [ "$HTTP_STATUS" == "200" ]; then
            echo "Version $VERSION already exists! Bumping minor version..."
            hatch version minor
            
            NEW_VERSION=$(hatch version)
            echo "New version: $NEW_VERSION"
            
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION does not exist on PyPI. Proceeding with current version."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      - name: Build standard distributions
        run: hatch build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Set Release as Current (Remove Draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the actual version published
          VERSION=$(hatch version)
          
          echo "Updating release v$VERSION..."
          if gh release view v$VERSION &>/dev/null; then
            gh release edit v$VERSION --draft=false
            echo "Release v$VERSION is now published."
          else
            echo "Draft release v$VERSION not found. Creating a new release."
            gh release create v$VERSION --title "v$VERSION" --notes "Release v$VERSION"
          fi
